services:
  postgres:
    image: postgres:16
    container_name: maintchain-postgres
    environment:
      POSTGRES_USER: maintchain
      POSTGRES_PASSWORD: maintchain
      POSTGRES_DB: maintchain
    ports:
      - "5432:5432"
    volumes:
      - maintchain_postgres_data:/var/lib/postgresql/data

volumes:
  maintchain_postgres_data:
